<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 CineTrack — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e3e;
      --accent: #c084fc;
      --accent2: #818cf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --danger: #f87171;
      --success: #34d399;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container { width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .form { display: flex; flex-direction: column; gap: 14px; }
    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: -8px;
    }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      width: 100%;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { color: var(--muted); font-size: 0.8rem; }

    /* Google Button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-google:hover { border-color: var(--accent); background: var(--surface); }
    .btn-google img { width: 20px; height: 20px; }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      display: none;
      margin-bottom: 8px;
    }
    .message.error {
      background: rgba(248,113,113,0.15);
      color: var(--danger);
      border: 1px solid var(--danger);
      display: block;
    }
    .message.success {
      background: rgba(52,211,153,0.15);
      color: var(--success);
      border: 1px solid var(--success);
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🎬 CineTrack</h1>
      <p>Your personal movie watchlist</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', event)">Login</button>
        <button class="tab" onclick="switchTab('signup', event)">Sign Up</button>
      </div>

      <div id="message" class="message"></div>

      <!-- LOGIN FORM -->
      <div id="loginForm" class="form">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" />
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
        <button class="btn" onclick="handleLogin()">Login →</button>
        <div class="divider"><span>or</span></div>
        <button class="btn-google" onclick="handleGoogleLogin()">
          <img src="https://www.google.com/favicon.ico" alt="Google" />
          Continue with Google
        </button>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="form" style="display:none">
        <label>First Name</label>
        <input type="text" id="signupName" placeholder="Your Name" />
        <label>Last Name</label>
        <input type="text" id="signupName" placeholder="Your Name" />
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" />
        <label>Create Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters" />
        <label>Confirm Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters" />
        <button class="btn" onclick="handleSignup()">Create Account →</button>
        <div class="divider"><span>or</span></div>
        <button class="btn-google" onclick="handleGoogleLogin()">
          <img src="https://www.google.com/favicon.ico" alt="Google" />
          Continue with Google
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://cgylgdcphkraqcrttpym.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_b4kOwdEzwx3ovnYlIqPvTQ_5Lnqa9Iq';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Already logged in → go to app
    _supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    function switchTab(tab, event) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('loginForm').style.display  = tab === 'login'  ? 'flex' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'flex' : 'none';
      showMessage('', '');
    }

    function showMessage(msg, type) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = 'message ' + type;
    }

    // ===== EMAIL LOGIN =====
    async function handleLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showMessage('Enter Email and Password!', 'error'); return; }

      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) { showMessage('❌ ' + error.message, 'error'); return; }
      window.location.href = 'index.html';
    }

    // ===== EMAIL SIGNUP =====
    async function handleSignup() {
      const name     = document.getElementById('signupName').value.trim();
      const email    = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (!name)     { showMessage('Enter Name!', 'error'); return; }
      if (!email)    { showMessage('Enter Email!', 'error'); return; }
      if (password.length < 6) { showMessage('Password min 6 characters!', 'error'); return; }

      const { error } = await _supabase.auth.signUp({
        email,
        password,
        options: { data: { full_name: name } }
      });

      if (error) { showMessage('❌ ' + error.message, 'error'); return; }
      showMessage('✅ Account created! Login பண்ணுங்க!', 'success');
    }

    // ===== GOOGLE LOGIN =====
    async function handleGoogleLogin() {
      const { error } = await _supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'https://arun-r17.github.io/movie-watchlist/index.html'
        }
      });
      if (error) { showMessage('❌ ' + error.message, 'error'); }
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginVisible = document.getElementById('loginForm').style.display !== 'none';
        if (loginVisible) handleLogin(); else handleSignup();
      }
    });
  </script>
</body>
</html>
